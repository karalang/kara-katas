name: lint

# Runs on every push to main (the cloud kata-authoring sessions push here
# directly) and on PRs, so a bench.sh committed without its executable bit is
# caught in CI rather than at the next person's first bench run (exit 126).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-katas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: kata structural lints (bench.sh exec bit)
        run: ./scripts/lint-katas.sh
